<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name">
            <button>🔍</button>
        </div>

        <div class="weather">
            <img src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png" class="weather-icon">

            <h1 class="temp">28°C</h1>
            <h2 class="city">Pune</h2>

            <div class="details">
                <div class="col">
                    <div>
                        <p class="value">65%</p>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="col">
                    <div>
                        <p class="value">12 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="api.js"></script>
</body>
</html>
